<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Space Arcade — Local multiplayer games coming soon!">
  <title>Space Arcade — Local Multiplayer</title>
  <link rel="icon" type="image/svg+xml" href="assets/spaceship.svg">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

  <!-- Starfield Background -->
  <div id="starfield"></div>

  <!-- Page Content -->
  <div class="page-content compact-page">

    <!-- Header Banner -->
    <header class="arcade-header">
      <a href="index.html" class="arcade-logo-link">
        <h1 class="arcade-logo">
          <span class="hover-letter">S</span><span class="hover-letter">P</span><span class="hover-letter">A</span><span class="hover-letter">C</span><span class="hover-letter">E</span>
          &nbsp;
          <span class="hover-letter">A</span><span class="hover-letter">R</span><span class="hover-letter">C</span><span class="hover-letter">A</span><span class="hover-letter">D</span><span class="hover-letter">E</span>
        </h1>
      </a>
      <p class="arcade-subtitle">LOCAL MULTIPLAYER</p>
    </header>

    <!-- Game Cards Grid -->
    <section class="games-grid compact-grid" id="games-grid">
      <div class="coming-soon-msg">
        <p>🚀 No offline multiplayer missions available yet!</p>
        <p>Check back soon, Commander!</p>
        <a href="index.html" class="synth-btn" data-tip="🏠 Go back to the main menu!"><span class="btn-scanline"></span>BACK TO ARCADE</a>
      </div>
    </section>

  </div>

  <!-- Lightsaber Volume UI -->
  <div id="lightsaber-volume">
    <div class="hilt-btn"></div>
    <div class="blade-container">
      <div class="blade-glow"></div>
      <input type="range" min="0" max="1" step="0.01" value="0.5" class="volume-slider">
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/stars.js"></script>
  <script type="module" src="js/cursor.js"></script>
  <script type="module" src="js/audio.js"></script>
  <script type="module" src="js/tooltips.js"></script>
  <script src="js/transitions.js"></script>

  <script src="js/ufo-nav.js"></script>
</body>
</html>
